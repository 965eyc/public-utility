  <script>
    (function () {
      var root = document.querySelector(".section5-calendar-layer");
      if (!root) return;

      var monthEl = document.getElementById("section5-calendar-month");
      var gridEl = document.getElementById("section5-calendar-grid");
      var profileDayEl = document.getElementById("section5-profile-day");
      var leftBtn = root.querySelector(".s1-top-card__nav-btn--left");
      var rightBtn = root.querySelector(".s1-top-card__nav-btn--right");

      var months = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];
      var year = 2027;
      var month = 0;

      function cellCount() {
        var first = new Date(year, month, 1).getDay();
        var dim = new Date(year, month + 1, 0).getDate();
        var used = first + dim;
        var total = Math.ceil(used / 7) * 7;
        if (total < 35) total = 35;
        if (total > 42) total = 42;
        return { first: first, dim: dim, total: total };
      }

      function render() {
        var info = cellCount();
        monthEl.textContent = months[month] + " " + year;
        monthEl.setAttribute("aria-label", months[month] + " " + year);
        gridEl.innerHTML = "";

        var d = 1;
        for (var i = 0; i < info.total; i++) {
          var cell;
          if (i < info.first || d > info.dim) {
            cell = document.createElement("div");
            cell.className = "calendar-grid__cell";
            cell.setAttribute("aria-hidden", "true");
          } else {
            cell = document.createElement("div");
            cell.className = "calendar-grid__cell";
            if (month === 0 && d === 29) {
              cell.classList.add("calendar-grid__cell--mark");
            }
            cell.setAttribute("data-day", String(d));
            d++;
          }
          gridEl.appendChild(cell);
        }
      }

      function stepMonth(delta) {
        month += delta;
        if (month > 11) {
          month = 0;
          year++;
        } else if (month < 0) {
          month = 11;
          year--;
        }
        render();
      }

      function setProfileDay(day) {
        if (!profileDayEl) return;
        profileDayEl.textContent = String(day);
      }

      leftBtn?.addEventListener("click", function () { stepMonth(-1); });
      rightBtn?.addEventListener("click", function () { stepMonth(1); });
      gridEl?.addEventListener("click", function (e) {
        var hit = e.target.closest(".calendar-grid__cell[data-day]");
        if (!hit || !gridEl.contains(hit)) return;
        setProfileDay(hit.getAttribute("data-day"));
      });

      render();
    })();
  </script>
