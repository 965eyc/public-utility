  <script>
    (function () {
      var PU = window.PublicUtility;
      var root = document.querySelector(".section2-calendar-layer");
      if (!root) return;
      var monthEl = root.querySelector(".s1-top-card__month");
      var gridEl = document.getElementById("section2-calendar-grid");
      var profileDayEl = document.getElementById("section2-profile-mark-day");
      var months = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];
      var year = 2027;
      var month = 0;

      function cellCount() {
        var first = new Date(year, month, 1).getDay();
        var dim = new Date(year, month + 1, 0).getDate();
        var used = first + dim;
        var total = Math.ceil(used / 7) * 7;
        if (total < 35) total = 35;
        if (total > 42) total = 42;
        return { first: first, dim: dim, total: total };
      }

      function render() {
        var info = cellCount();
        monthEl.textContent = months[month] + " " + year;
        monthEl.setAttribute("aria-label", months[month] + " " + year);
        gridEl.innerHTML = "";
        var d = 1;
        for (var i = 0; i < info.total; i++) {
          var cell;
          if (i < info.first || d > info.dim) {
            cell = document.createElement("div");
            cell.className = "calendar-grid__cell";
            cell.setAttribute("aria-hidden", "true");
          } else {
            var isMark = month === 0 && d === 29;
            if (isMark) {
              cell = document.createElement("div");
              cell.className = "calendar-grid__cell calendar-grid__cell--mark";
            } else {
              cell = document.createElement("div");
              cell.className = "calendar-grid__cell";
            }
            cell.setAttribute("data-day", String(d));
            d++;
          }
          gridEl.appendChild(cell);
        }
      }

      function setProfileDay(day) {
        if (!profileDayEl) return;
        profileDayEl.textContent = String(day);
      }

      function stepMonth(delta) {
        month += delta;
        if (month > 11) {
          month = 0;
          year++;
        } else if (month < 0) {
          month = 11;
          year--;
        }
        render();
      }

      async function hydrateAvatarLinks() {
        var avatarLinks = Array.from(document.querySelectorAll(".section2-avatar-hit"));
        if (!avatarLinks.length || !PU || !PU.supabase) return;
        try {
          var sessionRes = await PU.supabase.auth.getSession();
          var currentUserId =
            sessionRes &&
            sessionRes.data &&
            sessionRes.data.session &&
            sessionRes.data.session.user &&
            sessionRes.data.session.user.id
              ? sessionRes.data.session.user.id
              : null;
          var rowsRes = await PU.supabase
            .from("program_state")
            .select("user_id, updated_at")
            .order("updated_at", { ascending: false });
          if (rowsRes.error || !rowsRes.data) return;
          var uniqueOtherUserIds = [];
          var seen = {};
          rowsRes.data.forEach(function (row) {
            var id = row && row.user_id ? row.user_id : null;
            if (!id || id === currentUserId || seen[id]) return;
            seen[id] = true;
            uniqueOtherUserIds.push(id);
          });
          avatarLinks.forEach(function (link, index) {
            var participantId = uniqueOtherUserIds[index];
            if (!participantId) {
              link.href = "section7.html";
              link.style.pointerEvents = "none";
              link.setAttribute("aria-disabled", "true");
              return;
            }
            link.href = "section7.html?user=" + encodeURIComponent(participantId);
            link.style.pointerEvents = "";
            link.removeAttribute("aria-disabled");
          });
        } catch (err) {
          console.error("[section6] hydrate avatars", err);
        }
      }

      root.querySelector(".s1-top-card__nav-btn--left")?.addEventListener("click", function () {
        stepMonth(-1);
      });
      root.querySelector(".s1-top-card__nav-btn--right")?.addEventListener("click", function () {
        stepMonth(1);
      });
      function keyNav(e, delta) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          stepMonth(delta);
        }
      }
      root.querySelector(".s1-top-card__nav-btn--left")?.addEventListener("keydown", function (e) {
        keyNav(e, -1);
      });
      root.querySelector(".s1-top-card__nav-btn--right")?.addEventListener("keydown", function (e) {
        keyNav(e, 1);
      });
      gridEl?.addEventListener("click", function (e) {
        var hit = e.target.closest(".calendar-grid__cell[data-day]");
        if (!hit || !gridEl.contains(hit)) return;
        if (hit.classList.contains("calendar-grid__cell--mark") && hit.getAttribute("data-day") === "29") {
          window.location.href = "section3.html";
          return;
        }
        setProfileDay(hit.getAttribute("data-day"));
      });

      render();
      hydrateAvatarLinks();
    })();
  </script>
