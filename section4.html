<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel Picker</title>
  <style>
    :root {
      --bg: #edf1ff;
      --card: #ffffff;
      --text: #1f285b;
      --accent: #4379ff;
      --accent-2: #ff3c00;
      --muted: #6f7696;
      --ring: rgba(67, 121, 255, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg) 0%, #dfe6ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(440px, 100%);
      max-width: 440px;
      min-height: 956px;
      height: 956px;
      margin: 0 auto;
      padding: 14px;
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 16px;
    }

    .shell-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .wheel-top-overlay {
      position: absolute;
      top: 100px;
      left: 0;
      width: 440px;
      height: 116px;
      z-index: 2;
      pointer-events: none;
    }

    .wheel-spin-trigger {
      position: absolute;
      top: 560px;
      left: 144px;
      width: 153px;
      height: 74px;
      z-index: 3;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .wheel-spin-trigger svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .card {
      position: relative;
      z-index: 1;
      background: transparent;
      border-radius: 18px;
      box-shadow: none;
      padding: 16px;
      height: 100%;
    }

    .title {
      margin: 0 0 10px;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }

    .layout {
      position: relative;
      display: grid;
      gap: 16px;
      padding-top: 40px;
      margin-top: 90px;
    }

    .layout-overlay-icon {
      position: absolute;
      top: 12px;
      left: 12px;
      transform: none;
      z-index: 4;
      width: 68px;
      height: 68px;
      display: inline-flex;
      border: 0;
      padding: 0;
      background: transparent;
    }

    .entry-popup[hidden] {
      display: none;
    }

    .entry-popup {
      position: fixed;
      inset: 0;
      z-index: 998;
      display: grid;
      place-items: center;
    }

    .entry-popup__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(31, 40, 91, 0.45);
    }

    .left-panel {
      position: relative;
      z-index: 1;
      width: min(92vw, 460px);
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      min-height: 520px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .left-panel__head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 30px;
    }

    .left-panel__close {
      position: absolute;
      top: 8px;
      left: 14px;
      width: auto;
      height: auto;
      min-width: 0;
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: #6f7696;
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
    }

    .entry-popup__input {
      width: 100%;
      border: 2px solid #d6dcf6;
      border-radius: 12px;
      padding: 12px;
      font: inherit;
      color: var(--text);
      outline: none;
    }

    .entry-popup__input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .entry-popup__actions {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin-top: 12px;
    }

    .entry-popup__confirm {
      background: var(--accent);
      color: #fff;
      min-width: 106px;
    }

    .entry-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .entry-list__card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-radius: 12px;
      border: 2px solid #d6dcf6;
      background: #f6f8ff;
      padding: 10px 12px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      outline: none;
    }

    .entry-list__card:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .entry-list__name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entry-list__delete {
      width: 28px;
      height: 28px;
      min-width: 28px;
      padding: 0;
      border-radius: 50%;
      border: 0;
      background: #ffe6de;
      color: #ff3c00;
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
    }

    .entry-list__delete:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .helper {
      margin: 10px 0 0;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .spin-btn {
      background: var(--accent);
      color: #fff;
    }

    .spin-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .clear-btn {
      background: #ecf0ff;
      color: var(--text);
    }

    .entry-count {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 600;
    }

    .wheel-wrap {
      position: relative;
      width: min(520px, 100%);
      margin: 0 auto;
      aspect-ratio: 1;
      left: 5px;
      top: 100px;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
      background: transparent;
    }

    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 26px solid var(--accent-2);
      filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.2));
      z-index: 2;
    }

    .modal[hidden] {
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: grid;
      place-items: center;
    }

    .modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(31, 40, 91, 0.45);
    }

    .modal__panel {
      position: relative;
      z-index: 1;
      width: min(92vw, 420px);
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .modal__title {
      margin: 0;
      font-size: 1.35rem;
      color: var(--text);
    }

    .modal__winner {
      margin: 10px 0 16px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      word-break: break-word;
    }

    .modal__close {
      background: var(--accent);
      color: #fff;
      min-width: 112px;
    }

    @media (min-width: 860px) {
      .layout {
        grid-template-columns: 380px 1fr;
        align-items: end;
      }
    }

    .section4-back-link {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 68px;
      height: 68px;
      z-index: 5;
      display: block;
      line-height: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .section4-back-link svg {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .section4-back-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 50%;
    }
  </style>
</head>

  <div id="entryPopup" class="entry-popup" hidden>
    <div class="entry-popup__backdrop" data-close-entry-popup></div>
    <div class="left-panel" role="dialog" aria-modal="true" aria-labelledby="entriesTitle">
      <div class="left-panel__head">
        <label id="entriesTitle" for="entryInput" class="title" style="font-size:1rem;margin:0;"></label>
        <button id="closeEntryPopupBtn" class="left-panel__close" type="button" aria-label="Close">x</button>
      </div>
      <input id="entryInput" class="entry-popup__input" type="text" maxlength="60" placeholder="Type one entry name">
      <div class="entry-popup__actions">
        <button id="confirmEntryBtn" class="entry-popup__confirm" type="button">Confirm</button>
        <span id="entryCount" class="entry-count"></span>
      </div>
      <div id="entryList" class="entry-list" role="list" aria-label="Wheel entries"></div>
      <p class="helper"></p>
    </div>
  </div>

  <div id="winnerModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="winnerTitle" hidden>
    <div class="modal__backdrop" data-close-modal></div>
    <div class="modal__panel">
      <h2 id="winnerTitle" class="modal__title">Winner:</h2>
      <p id="winnerText" class="modal__winner"></p>
      <button id="closeModalBtn" class="modal__close" type="button">Close</button>
    </div>
  </div>

  <script>
    (function () {
      const entryInputEl = document.getElementById("entryInput");
      const confirmEntryBtn = document.getElementById("confirmEntryBtn");
      const entryListEl = document.getElementById("entryList");
      const entryCount = document.getElementById("entryCount");
      const canvas = document.getElementById("wheelCanvas");
      const ctx = canvas.getContext("2d");
      const spinTriggerBtn = document.getElementById("spinTriggerBtn");
      const openEntryPopupBtn = document.getElementById("openEntryPopupBtn");
      const closeEntryPopupBtn = document.getElementById("closeEntryPopupBtn");
      const entryPopup = document.getElementById("entryPopup");

      const modal = document.getElementById("winnerModal");
      const winnerText = document.getElementById("winnerText");
      const closeModalBtn = document.getElementById("closeModalBtn");

      const colors = [
        "#4379FF", "#FF8A65", "#26C6DA", "#AB47BC", "#FBC02D", "#66BB6A",
        "#5C6BC0", "#EF5350", "#8D6E63", "#29B6F6", "#EC407A", "#9CCC65"
      ];

      let entries = [];
      let editingIndex = null;
      let isSpinning = false;
      let currentRotation = 0;

      function updateEntryCount() {
        entryCount.textContent = "";
      }

      function renderEntryList() {
        entryListEl.innerHTML = "";
        entries.forEach(function (name, index) {
          const card = document.createElement("div");
          card.className = "entry-list__card";
          card.setAttribute("role", "listitem");
          card.setAttribute("tabindex", "0");
          card.setAttribute("data-entry-index", String(index));
          const nameEl = document.createElement("span");
          nameEl.className = "entry-list__name";
          nameEl.textContent = name;
          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "entry-list__delete";
          deleteBtn.setAttribute("data-entry-delete", "true");
          deleteBtn.setAttribute("aria-label", "Delete " + name);
          deleteBtn.textContent = "x";
          card.appendChild(nameEl);
          card.appendChild(deleteBtn);
          entryListEl.appendChild(card);
        });
      }

      function syncEntriesView() {
        updateEntryCount();
        renderEntryList();
        drawWheel();
      }

      function resetEntryEditor() {
        editingIndex = null;
        entryInputEl.value = "";
      }

      function openEntryPopupNew() {
        resetEntryEditor();
        entryPopup.hidden = false;
        entryInputEl.focus();
      }

      function openEntryPopupEdit(index) {
        if (index < 0 || index >= entries.length) return;
        editingIndex = index;
        entryPopup.hidden = false;
        entryInputEl.value = entries[index];
        entryInputEl.focus();
        entryInputEl.select();
      }

      function applyEntryInput() {
        const value = entryInputEl.value.trim();
        if (editingIndex !== null) {
          if (!value) {
            entries.splice(editingIndex, 1);
          } else {
            entries[editingIndex] = value;
          }
        } else if (value) {
          entries.push(value);
        }
        resetEntryEditor();
        syncEntriesView();
      }

      function drawWheel() {
        const size = canvas.width;
        const center = size / 2;
        const radius = center - 12;
        const n = entries.length;

        ctx.clearRect(0, 0, size, size);
        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(currentRotation);

        if (n === 0) {
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, Math.PI * 2);
          ctx.fillStyle = "#eef1ff";
          ctx.fill();
          ctx.strokeStyle = "#d4dbfb";
          ctx.lineWidth = 3;
          ctx.stroke();

          ctx.fillStyle = "#6f7696";
          ctx.font = "600 28px Inter, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("Add entries to begin", 0, 0);
          ctx.restore();
          return;
        }

        const segmentAngle = (Math.PI * 2) / n;
        for (let i = 0; i < n; i += 1) {
          const start = i * segmentAngle;
          const end = start + segmentAngle;

          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, radius, start, end);
          ctx.closePath();
          ctx.fillStyle = colors[i % colors.length];
          ctx.fill();
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.save();
          ctx.rotate(start + segmentAngle / 2);
          ctx.textAlign = "right";
          ctx.textBaseline = "middle";
          ctx.fillStyle = "#ffffff";
          ctx.font = "600 24px Inter, sans-serif";
          const label = entries[i].length > 22 ? entries[i].slice(0, 22) + "..." : entries[i];
          ctx.fillText(label, radius - 20, 0);
          ctx.restore();
        }

        ctx.beginPath();
        ctx.arc(0, 0, 34, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff";
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = "#cdd8ff";
        ctx.stroke();

        ctx.restore();
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function spin() {
        if (entries.length < 2 || isSpinning) return;

        isSpinning = true;

        const winningIndex = Math.floor(Math.random() * entries.length);
        const n = entries.length;
        const segmentAngle = (Math.PI * 2) / n;
        const centerOfWinner = winningIndex * segmentAngle + segmentAngle / 2;

        const desiredFinal = -Math.PI / 2 - centerOfWinner;
        const minTurns = 6;
        const maxTurns = 10;
        const fullTurns = minTurns + Math.floor(Math.random() * (maxTurns - minTurns + 1));

        const baseRotation = currentRotation % (Math.PI * 2);
        let delta = desiredFinal - baseRotation;
        while (delta < 0) delta += Math.PI * 2;
        const targetRotation = currentRotation + delta + fullTurns * Math.PI * 2;

        const duration = 4200;
        const start = performance.now();
        const startRotation = currentRotation;

        function animate(now) {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          const eased = easeOutCubic(progress);

          currentRotation = startRotation + (targetRotation - startRotation) * eased;
          drawWheel();

          if (progress < 1) {
            requestAnimationFrame(animate);
            return;
          }

          currentRotation = targetRotation;
          drawWheel();
          isSpinning = false;
          showWinner(entries[winningIndex]);
        }

        requestAnimationFrame(animate);
      }

      function showWinner(name) {
        winnerText.textContent = name;
        modal.hidden = false;
      }

      function closeModal() {
        modal.hidden = true;
      }

      function openEntryPopup() {
        openEntryPopupNew();
      }

      function closeEntryPopup() {
        entryPopup.hidden = true;
        resetEntryEditor();
      }

      spinTriggerBtn.addEventListener("click", spin);
      openEntryPopupBtn.addEventListener("click", openEntryPopup);
      closeEntryPopupBtn.addEventListener("click", closeEntryPopup);
      entryPopup.querySelector("[data-close-entry-popup]").addEventListener("click", closeEntryPopup);
      confirmEntryBtn.addEventListener("click", applyEntryInput);
      entryInputEl.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          applyEntryInput();
        }
      });
      entryListEl.addEventListener("click", function (event) {
        const card = event.target.closest(".entry-list__card");
        if (!card || !entryListEl.contains(card)) return;
        const index = Number(card.getAttribute("data-entry-index"));
        if (!Number.isInteger(index)) return;
        const deleteBtn = event.target.closest("[data-entry-delete]");
        if (deleteBtn) {
          if (isSpinning) return;
          entries.splice(index, 1);
          resetEntryEditor();
          syncEntriesView();
          return;
        }
        openEntryPopupEdit(index);
      });
      entryListEl.addEventListener("keydown", function (event) {
        if (event.key !== "Enter" && event.key !== " ") return;
        const card = event.target.closest(".entry-list__card");
        if (!card || !entryListEl.contains(card)) return;
        const index = Number(card.getAttribute("data-entry-index"));
        if (!Number.isInteger(index)) return;
        if (event.key === " ") event.preventDefault();
        openEntryPopupEdit(index);
      });

      closeModalBtn.addEventListener("click", closeModal);
      modal.querySelector("[data-close-modal]").addEventListener("click", closeModal);

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && !modal.hidden) {
          closeModal();
        }
        if (event.key === "Escape" && !entryPopup.hidden) {
          closeEntryPopup();
        }
      });

      entries = ["Alice", "Bob", "Charlie", "Dana", "Elliot"];
      syncEntriesView();
    })();
  </script>
