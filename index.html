<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-signup">
  <div class="shell shell--signup">
    <img class="shell--signup__bg" src="assets/signup-shell-bg.png" alt="">
    <main class="signup">
      <h1 class="signup__title" id="auth-title">Sign up</h1>
      <p class="signup__auth-status" id="auth-status" role="status" aria-live="polite"></p>
      <form class="signup__form" id="auth-form" novalidate>
        <label class="signup__label signup-only">
          <span class="signup__label-text">Name</span>
          <input class="signup__input" type="text" name="name" id="auth-name" autocomplete="name">
        </label>
        <label class="signup__label">
          <span class="signup__label-text">Email</span>
          <input class="signup__input" type="email" name="email" id="auth-email" autocomplete="email" required>
        </label>
        <label class="signup__label">
          <span class="signup__label-text">Password</span>
          <input class="signup__input" type="password" name="password" id="auth-password" autocomplete="new-password" required minlength="8">
        </label>
        <label class="signup__label signup-only">
          <span class="signup__label-text">Confirm password</span>
          <input class="signup__input" type="password" name="password_confirm" id="auth-password-confirm" autocomplete="new-password" minlength="8">
        </label>
        <button type="submit" class="signup__submit" id="auth-submit">Create account</button>
      </form>
      <p class="signup__mode-toggle">
        <button type="button" class="signup__link-btn" id="mode-toggle">Already have an account? Sign in</button>
      </p>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="project-shared.js"></script>
  <script src="supabase-client.js"></script>
  <script>
    (function () {
      var MIN_PASSWORD = 8;
      var body = document.body;
      var form = document.getElementById("auth-form");
      var titleEl = document.getElementById("auth-title");
      var statusEl = document.getElementById("auth-status");
      var submitBtn = document.getElementById("auth-submit");
      var modeToggle = document.getElementById("mode-toggle");
      var nameInput = document.getElementById("auth-name");
      var emailInput = document.getElementById("auth-email");
      var passInput = document.getElementById("auth-password");
      var passConfirm = document.getElementById("auth-password-confirm");
      var isLogin = false;

      function setStatus(msg) {
        statusEl.textContent = msg || "";
      }

      function applyMode() {
        body.classList.toggle("is-login", isLogin);
        titleEl.textContent = isLogin ? "Log in" : "Sign up";
        submitBtn.textContent = isLogin ? "Sign in" : "Create account";
        modeToggle.textContent = isLogin
          ? "Need an account? Sign up"
          : "Already have an account? Sign in";
        nameInput.required = !isLogin;
        passConfirm.required = !isLogin;
        passInput.setAttribute("autocomplete", isLogin ? "current-password" : "new-password");
        if (isLogin) {
          passConfirm.removeAttribute("required");
        }
        setStatus("");
      }

      modeToggle.addEventListener("click", function () {
        isLogin = !isLogin;
        applyMode();
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        setStatus("");
        var supa = window.PublicUtility && window.PublicUtility.supabase;
        if (!supa) {
          setStatus("Supabase is not configured. Edit supabase-config.js with your anon key.");
          return;
        }
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }
        var email = emailInput.value.trim();
        var password = passInput.value;
        if (password.length < MIN_PASSWORD) {
          setStatus("Password must be at least " + MIN_PASSWORD + " characters.");
          return;
        }
        if (!isLogin) {
          var fullName = nameInput.value.trim();
          if (!fullName) {
            setStatus("Please enter your name.");
            return;
          }
          if (password !== passConfirm.value) {
            setStatus("Passwords do not match.");
            return;
          }
          submitBtn.disabled = true;
          var signUpRes = await supa.auth.signUp({
            email: email,
            password: password,
            options: { data: { full_name: fullName } },
          });
          submitBtn.disabled = false;
          if (signUpRes.error) {
            setStatus(signUpRes.error.message);
            return;
          }
          if (!signUpRes.data.session || !signUpRes.data.user) {
            setStatus("Check your email to confirm your account, then sign in.");
            isLogin = true;
            applyMode();
            return;
          }
          var user = signUpRes.data.user;
          var profileErr = await supa.from("profiles").upsert(
            { id: user.id, full_name: fullName },
            { onConflict: "id" }
          );
          if (profileErr.error) {
            setStatus(profileErr.error.message);
            return;
          }
          var stateErr = await supa.from("program_state").upsert(
            { user_id: user.id, payload: {} },
            { onConflict: "user_id" }
          );
          if (stateErr.error) {
            setStatus(stateErr.error.message);
            return;
          }
          window.location.href = "home.html";
          return;
        }
        submitBtn.disabled = true;
        var signInRes = await supa.auth.signInWithPassword({ email: email, password: password });
        submitBtn.disabled = false;
        if (signInRes.error) {
          setStatus(signInRes.error.message);
          return;
        }
        window.location.href = "home.html";
      });

      applyMode();
    })();
  </script>
</body>
</html>
