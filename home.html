  <script>
    (function () {
      var months = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];
      function stepMonth(delta) {
        var el = document.querySelector(".s1-top-card__month");
        if (!el) return;
        var i = months.indexOf(el.textContent.trim());
        if (i === -1) i = 0;
        el.textContent = months[(i + delta + 12) % 12];
      }
      document.querySelector(".s1-top-card__nav-btn--left")?.addEventListener("click", function () {
        stepMonth(-1);
      });
      document.querySelector(".s1-top-card__nav-btn--right")?.addEventListener("click", function () {
        stepMonth(1);
      });
    })();
  </script>
